name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          cd web
          npm ci

      - name: Build
        run: |
          cd web
          npm run build
        env:
          VITE_DEFAULT_API_KEY: ${{ secrets.DEFAULT_MINIMAX_API_KEY }}

      - name: Security Check - Verify no API keys in dist
        run: |
          echo "Checking dist files for API keys..."

          # Check for common API key patterns in dist
          if grep -rq "sk-[a-zA-Z0-9]" dist/; then
            echo "ERROR: Found potential API key pattern 'sk-' in dist files!"
            grep -rn "sk-[a-zA-Z0-9]" dist/ || true
            exit 1
          fi

          if grep -rq "minimax.*api.*key" dist/ --include="*.js" --include="*.css"; then
            echo "WARNING: Found 'minimax api key' references in dist files"
          fi

          echo "Security check passed: No API keys found in dist files"

      - name: Deploy
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4